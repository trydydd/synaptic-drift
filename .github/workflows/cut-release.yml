name: Cut Release

# Manually trigger a release from the GitHub Actions UI.
# Runs pre-flight checks, bumps the version in pyproject.toml, commits,
# and pushes a vX.Y.Z tag — which in turn triggers the Release workflow
# to build artifacts and create the GitHub release.
#
# Note: this workflow pushes a commit directly to the triggering branch.
# If main has branch-protection rules that require PRs, replace
# GITHUB_TOKEN with a PAT that has "bypass branch protection" permission
# (or a GitHub App token), and set it in repo Settings → Secrets.

on:
  workflow_dispatch:
    inputs:
      bump:
        description: "Version component to bump"
        required: true
        default: patch
        type: choice
        options:
          - patch
          - minor
          - major

jobs:
  cut-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # full history so bump-my-version can tag correctly

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -e ".[all]" bump-my-version -q

      # ── pre-flight checks (mirrors CI) ───────────────────────────────────
      - name: ruff check
        run: ruff check .

      - name: ruff format check
        run: ruff format --check .

      - name: mypy
        run: mypy src/

      - name: pytest
        run: pytest tests/

      # ── bump, commit, tag ─────────────────────────────────────────────────
      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Bump version
        run: bump-my-version bump ${{ inputs.bump }}

      - name: Push commit and tag
        run: |
          git push origin HEAD:${{ github.ref_name }}
          git push origin --tags
