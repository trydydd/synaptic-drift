name: Cut Release

# Manually triggered from the Actions UI. Always operates on `develop`.
#
# Prepares a release without touching main: bumps the version (pyproject.toml +
# src/synd/__init__.py), rolls CHANGELOG "[Unreleased]" into a dated version
# section, and opens a PR back into develop. Merging that PR makes develop
# release-ready; promote.yml then opens the develop -> main PR, and merging THAT
# triggers auto-release.yml (tag + GitHub release).
#
# Cutting on develop — not main — is the whole point: the version bump reaches
# main only through the normal develop -> main promotion, so main stays a clean
# ancestor of develop and the two branches never diverge.

on:
  workflow_dispatch:
    inputs:
      bump:
        description: "Version component to bump"
        required: true
        default: patch
        type: choice
        options:
          - patch
          - minor
          - major

jobs:
  cut-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - uses: actions/checkout@v4
        with:
          ref: develop          # always cut from develop, regardless of dispatch ref
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -e ".[all]" bump-my-version -q

      # ── pre-flight checks (mirror ci.yml) ────────────────────────────────
      - name: ruff check
        run: ruff check .

      - name: ruff format check
        run: ruff format --check .

      - name: mypy
        run: mypy src/

      - name: pytest
        run: pytest tests/

      # ── bump version (files only; commit happens on the release branch) ──
      - name: Bump version
        run: bump-my-version bump ${{ inputs.bump }} --no-commit --no-tag

      - name: Read new version
        id: ver
        run: |
          NEW=$(python3 -c "import tomllib; print(tomllib.load(open('pyproject.toml','rb'))['project']['version'])")
          echo "new=$NEW" | tee -a "$GITHUB_OUTPUT"

      # ── finalize CHANGELOG: [Unreleased] -> [X.Y.Z] - <date>, reseed empty ──
      - name: Roll CHANGELOG
        env:
          NEW: ${{ steps.ver.outputs.new }}
        run: |
          python3 - <<'PY'
          import os, datetime, pathlib
          new = os.environ["NEW"]
          date = datetime.date.today().isoformat()
          path = pathlib.Path("CHANGELOG.md")
          text = path.read_text()
          marker = "## [Unreleased]"
          if marker not in text:
              raise SystemExit("CHANGELOG.md has no '## [Unreleased]' section to roll.")
          i = text.index(marker)
          # Keep a fresh empty Unreleased on top; move pending entries under the new version.
          replacement = f"## [Unreleased]\n\n## [{new}] - {date}"
          text = text[:i] + replacement + text[i + len(marker):]
          path.write_text(text)
          print(f"Rolled CHANGELOG: [Unreleased] -> [{new}] - {date}")
          PY

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Push release branch and open PR into develop
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NEW: ${{ steps.ver.outputs.new }}
        run: |
          BRANCH="release/v${NEW}"
          git checkout -b "$BRANCH"
          git add pyproject.toml src/synd/__init__.py CHANGELOG.md
          git commit -m "chore: release v${NEW}"
          git push origin "$BRANCH"
          gh pr create \
            --title "chore: release v${NEW}" \
            --body "Version bump to \`${NEW}\` + CHANGELOG. Merging into develop makes it release-ready; the develop → main promotion PR opens automatically and triggers Auto Release on merge." \
            --base develop \
            --head "$BRANCH"
