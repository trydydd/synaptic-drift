  # ---------------------------------------------------------------------------
  - id: "chunk-08-validator"
    title: "Archive safety validator — 8-step verification sequence"
    status: DONE
    depends_on: ["chunk-03-normalizer", "chunk-05-policy-engine"]
    token_budget_hint: medium

    local_context: |
      The validator runs the 8-step archive safety sequence defined in
      docs/architecture.md under "Archive Safety Validator". This is the
      security-critical path — it prevents tampered or malformed .ctx packs
      from entering the index.

      The 8 steps in order:
        1. Open archive, read manifest.json only (no other extraction)
        2. Validate manifest JSON schema (required fields present)
        3. Check lifecycle_state against policy
        4. Scan archive file listing for unsafe entries (absolute paths, ../, symlinks, etc.)
        5. Enforce size and count limits (10k entries, 50MB per file, 500MB total)
        6. Recompute pack_digest (zero the field, hash, compare)
        7. Recompute normalized_content_hash (extract chunks, normalize, hash, compare)
        8. Verify signature (only if policy.require_signatures = true)

      Step 8 (signatures) is a stub for MVP — just check if signatures are required
      and whether the file exists. Actual cryptographic verification is deferred.

      The validator imports normalize() from tank.builder.normalizer — this is the
      one allowed cross-module import.

    objective: |
      verify() takes a path to a .ctx file and a Policy, runs all 8 steps in order,
      and returns a VerifyResult with pass/fail, the step that failed, and a
      human-readable reason. Each step is independently testable. The function
      stops at the first failure.

    interface_contract:
      inputs:
        - path: "src/tank/builder/normalizer.py"
          consumes: [normalize]
        - path: "src/tank/policy/engine.py"
          consumes: [Policy, PolicyResult]
        - path: "src/tank/errors.py"
          consumes: [VerificationError]
      outputs:
        - path: "src/tank/validator/verify.py"
          exports:
            - |
              @dataclass
              class VerifyResult:
                  passed: bool
                  step: int | None  # step number that failed, None if all passed
                  reason: str
                  manifest: dict | None  # parsed manifest on success, None on failure before step 2
            - |
              def verify(
                  ctx_path: Path,
                  policy: Policy,
              ) -> VerifyResult: ...
        - path: "tests/test_validator/test_verify.py"
          exports:
            - "test_verify_valid_pack_passes()"
            - "test_step1_missing_manifest()"
            - "test_step2_missing_required_field()"
            - "test_step3_lifecycle_rejected_by_policy()"
            - "test_step4_absolute_path_rejected()"
            - "test_step4_path_traversal_rejected()"
            - "test_step4_symlink_rejected()"
            - "test_step5_too_many_entries()"
            - "test_step5_file_too_large()"
            - "test_step5_total_too_large()"
            - "test_step6_pack_digest_mismatch()"
            - "test_step7_content_hash_mismatch()"
            - "test_step8_signature_required_but_missing()"
            - "test_stops_at_first_failure()"
            # Negative tests — verify wrong behavior does NOT occur:
            - "test_verify_does_not_extract_to_disk()  # NEG: verify() must not write any file to disk — assert tmp_path is empty after verify() returns"
            - "test_verify_stops_at_first_failure()  # NEG: archive with step 2 AND step 4 failures must report step 2, not step 4"
            - "test_step6_does_not_pass_tampered_manifest()  # NEG: changing lifecycle_state post-build must fail step 6 — pack_digest covers all manifest fields"
        - path: "tests/fixtures/malformed_packs/"
          exports:
            - "# .ctx files with specific defects for each validation step"
      allowed_new_deps: []

    assumptions:
      - "zipfile.ZipFile can read .ctx files (they are standard zip archives)."
      - "zipfile.ZipInfo.is_dir(), .external_attr, and .filename are available for inspecting entries without extracting."
      - "To check for symlinks in a zip: check if (info.external_attr >> 16) & 0o120000 == 0o120000. NOTE: Windows-created zips may not set external_attr, so this check alone is not sufficient. As a secondary defense, also reject any entry whose resolved path (via PurePosixPath) differs from the raw filename (e.g. trailing slashes, embedded nulls, or OS-specific normalization). Both checks must be applied."
      - "Path traversal check: reject any entry where '..' appears as a path component. Use PurePosixPath(entry).parts and check for '..' in the tuple."
      - "Size limits from architecture.md: max 10,000 entries, max 50MB uncompressed per file (50 * 1024 * 1024 bytes), max 500MB total uncompressed (500 * 1024 * 1024 bytes). Use info.file_size for uncompressed size."
      - "For step 6 (pack_digest recomputation): read the archive bytes, parse manifest.json from it, replace pack_digest value with '', re-serialize manifest with sort_keys=True, rebuild the archive bytes with the modified manifest, hash those bytes. This is the same zeroing convention used at build time."
      - "For step 7: extract chunks.jsonl from the archive, parse each line as JSON, sort by 'id' field, normalize each 'content' field using normalize(), concatenate with '\\n' separator, hash."
      - "Step 8 MVP stub: if policy.require_signatures is True, check that 'signatures/manifest.sig' exists in the archive. If it doesn't exist, fail. If it does exist, pass (no cryptographic verification)."
      - "Required manifest fields (step 2): schema_version, pack_format, package, version, pack_digest, normalized_content_hash, chunks, pages, lifecycle_state, doc_version_status, created_at, created_by."

    definition_of_done:
      automated:
        - cmd: "pytest tests/test_validator/test_verify.py -v"
          must_pass: true
        - cmd: "mypy src/tank/validator/verify.py"
          must_pass: true
        - cmd: "ruff check src/tank/validator/verify.py"
          must_pass: true
      coverage_floor: null
      manual_checklist:
        - "Every step has at least one failure test"
        - "Steps execute in order 1-8 and stop at first failure"
        - "normalize() is imported from tank.builder.normalizer, not reimplemented"
        - "No archive entry is extracted to disk — all reading via zipfile in-memory"

    capability_ceiling:
      - "Do not implement actual cryptographic signature verification. Step 8 only checks file existence."
      - "Do not implement any 'fix' or 'repair' functionality. The validator is read-only."
      - "Do not modify the validation step order or add new steps."
      - "If a .ctx file cannot be opened as a zip at all, return VerifyResult(passed=False, step=1, reason='Cannot open archive')."

    prerequisites:
      read_first:
        - progress.txt
        - docs/architecture.md
        - docs/decisions.md

    review_targets:
      - target: "Step 4 rejects entries with '..' in path components"
        verified_by: "test_step4_path_traversal_rejected"
        assertion: "Archive containing '../secret.txt' returns VerifyResult(passed=False, step=4)"
      - target: "Step 4 rejects absolute paths"
        verified_by: "test_step4_absolute_path_rejected"
        assertion: "Archive containing '/etc/passwd' returns VerifyResult(passed=False, step=4)"
      - target: "Step 6 pack_digest uses empty-string zeroing"
        verified_by: "test_verify_valid_pack_passes"
        assertion: "A valid .ctx built by build_pack() passes all 8 steps — proves the zeroing convention is symmetric"
      - target: "Step 7 uses normalize() from tank.builder.normalizer"
        verified_by: "test_step7_content_hash_mismatch"
        assertion: "Archive with modified chunk content (but valid pack_digest) fails at step 7, not step 6"
      - target: "verify() returns VerifyResult, never raises for expected failures"
        verified_by: "all test_step*"
        assertion: "Every failure test checks isinstance(result, VerifyResult) — no pytest.raises()"

    verification_inputs:
      - function: "verify (step 2 — manifest validation)"
        cases:
          - input: "manifest.json missing 'package' field"
            expected: "VerifyResult(passed=False, step=2, reason contains 'package')"
            label: "Missing required manifest field detected"
          - input: "manifest.json missing 'pack_digest' field"
            expected: "VerifyResult(passed=False, step=2, reason contains 'pack_digest')"
            label: "Missing integrity field detected"
      - function: "verify (step 3 — policy check)"
        cases:
          - input: "lifecycle_state='revoked', default policy"
            expected: "VerifyResult(passed=False, step=3)"
            label: "Revoked rejected by default policy"
      - function: "verify (step 5 — size limits)"
        cases:
          - input: "archive with 10,001 entries"
            expected: "VerifyResult(passed=False, step=5, reason contains 'entries')"
            label: "Entry count limit enforced at 10,000"

    negative_tests:
      - test_name: "test_verify_does_not_extract_to_disk"
        description: "Verification must be fully in-memory. No files should be written to the filesystem during verify(). Check that tmp_path is empty after verify() returns."
        must_not: "Any file or directory created on disk during verify()"
      - test_name: "test_verify_stops_at_first_failure"
        description: "If step 2 would fail AND step 4 would also fail, verify must report step 2. Create an archive with both a missing manifest field and a path traversal entry."
        must_not: "VerifyResult.step == 4 when step 2 should have failed first"
      - test_name: "test_step6_does_not_pass_tampered_manifest"
        description: "Modifying any manifest field (other than pack_digest) after archive assembly must cause step 6 to fail, because the archive bytes changed."
        must_not: "VerifyResult(passed=True) when manifest.lifecycle_state has been changed post-build"

    rollback_anchor:
      git_ref: ""
      file_checksums: {}

    handoff:
      status_note: "All 20 tests pass. mypy clean, ruff clean. verify() implements all 8 steps: archive open, manifest validation, policy check, unsafe entry scan, size/count limits, pack_digest recomputation, normalized_content_hash recomputation, signature stub. All negative tests implemented: in-memory-only verification, stops-at-first-failure, tampered manifest detection. Verified against all verification_inputs cases. Pre-existing code had 2 ruff issues (unused VerificationError import, unused archive_bytes variable) — fixed by executor."
      files_modified:
        - "src/tank/validator/verify.py"
        - "tests/test_validator/test_verify.py"
      open_questions: []
      progress_log_updated: true

    review:
      outcome: ""
      rejection_reason: ""
      reviewed_at: ""


  # ---------------------------------------------------------------------------
  - id: "chunk-09-cli-commands"
    title: "CLI commands — build, verify, pull, query, inspect"
    status: DONE
    depends_on: ["chunk-07-builder", "chunk-08-validator", "chunk-06-search-layer", "chunk-04-storage-layer", "chunk-05-policy-engine"]
    token_budget_hint: medium

    local_context: |
      The CLI is a thin wrapper over Tank's core libraries. Each command maps to
      one or two core function calls. The CLI uses click for command parsing and
      rich for terminal output.

      Commands (from docs/architecture.md CLI Tooling section):
        - tank build <package@version> --source <path> [--output ./] [--lifecycle draft] [--owner] [--policy-profile]
        - tank verify <file.ctx> [--policy ./policy.toml]
        - tank pull <file.ctx> [--policy ./policy.toml] [--force]
        - tank query <query> [--package pkg] [--detail summary|full] [--limit N]
        - tank inspect <file.ctx | .tank/index.db>

      The CLI catches TankError subclasses and prints user-friendly messages.
      It uses sys.exit() with appropriate exit codes (0 for success, 1 for errors).

      tank pull = verify + import. It calls verify() first, and only imports if
      all checks pass. It also writes/updates .tank/index.lock after import.

      The root command group lives in src/tank/cli/main.py. Each subcommand is
      in its own file and registered with the group.

    objective: |
      All five CLI commands are functional. `tank build` calls build_pack().
      `tank verify` calls verify(). `tank pull` calls verify() then import_pack().
      `tank query` calls search(). `tank inspect` reads a .ctx manifest or queries
      the database. All commands print structured output via rich. Errors are caught
      and displayed as user-friendly messages.

    interface_contract:
      inputs:
        - path: "src/tank/builder/build.py"
          consumes: [build_pack]
        - path: "src/tank/validator/verify.py"
          consumes: [verify, VerifyResult]
        - path: "src/tank/storage/db.py"
          consumes: [Database]
        - path: "src/tank/search/fts.py"
          consumes: [search, get_chunks_by_id, SearchResult]
        - path: "src/tank/policy/engine.py"
          consumes: [Policy]
        - path: "src/tank/errors.py"
          consumes: [TankError]
        - path: "src/tank/storage/models.py"
          consumes: [Pack, Page, Chunk]
      outputs:
        - path: "src/tank/cli/main.py"
          exports:
            - "cli: click.Group"
        - path: "src/tank/cli/build.py"
          exports:
            - "@cli.command() def build(...) -> None"
        - path: "src/tank/cli/verify.py"
          exports:
            - "@cli.command() def verify_cmd(...) -> None"
        - path: "src/tank/cli/pull.py"
          exports:
            - "@cli.command() def pull(...) -> None"
        - path: "src/tank/cli/query.py"
          exports:
            - "@cli.command() def query(...) -> None"
        - path: "src/tank/cli/inspect.py"
          exports:
            - "@cli.command() def inspect_cmd(...) -> None"
        - path: "tests/test_cli/test_build.py"
          exports:
            - "test_build_command_success()"
            - "test_build_command_missing_source()"
            - "test_build_command_bad_package_format()"
        - path: "tests/test_cli/test_verify.py"
          exports:
            - "test_verify_command_pass()"
            - "test_verify_command_fail()"
        - path: "tests/test_cli/test_pull.py"
          exports:
            - "test_pull_command_success()"
            - "test_pull_command_verify_fails()"
            - "test_pull_command_duplicate_rejected()"
            - "test_pull_command_force_reimport()"
            # Negative tests:
            - "test_pull_does_not_import_on_verify_failure()  # NEG: failed verify must leave packages table empty — query DB after pull with malformed .ctx"
            - "test_pull_force_does_not_skip_verify()  # NEG: --force allows reimport but does NOT skip 8-step verification — tampered .ctx with --force must still be rejected"
        - path: "tests/test_cli/test_query.py"
          exports:
            - "test_query_command_summary()"
            - "test_query_command_full()"
            # Negative tests:
            - "test_query_does_not_crash_on_empty_db()  # NEG: query with no imported packs must exit 0 with empty results, not crash or exit 1"
        - path: "tests/test_cli/test_inspect.py"
          exports:
            - "test_inspect_ctx_file()"
            - "test_inspect_index_db()"
      allowed_new_deps: []

    assumptions:
      - "click.testing.CliRunner is the standard way to test click commands. runner.invoke(cli, ['build', ...]) returns a Result object with exit_code and output."
      - "package@version is parsed by splitting on '@'. If no '@' is present or the format is wrong, print an error and exit 1. If multiple '@' are present, also error — do not attempt to parse 'my@lib@1.0.0'."
      - "tank pull writes .tank/index.lock after successful import. The lockfile format is TOML as defined in docs/architecture.md. Use tomllib to read and manually format TOML to write (there is no tomllib.dumps in stdlib — write the TOML string manually or use a simple template). If the lockfile already exists, overwrite it with the updated state."
      - "tank pull --force behavior: run the full verify sequence first (--force does NOT skip verification). If verify passes and the pack already exists, call delete_pack(name, version) then import_pack() — the delete and import are separate operations, not a single transaction. If the pack does not exist, --force behaves identically to a normal pull."
      - "tank inspect on a .ctx file opens it as a zip and prints manifest fields. On index.db it opens the database and lists imported packs."
      - "rich.console.Console and rich.table.Table are used for formatted output."
      - "Commands that write to .tank/ (pull) should create the directory if it doesn't exist."

    definition_of_done:
      automated:
        - cmd: "pytest tests/test_cli/ -v"
          must_pass: true
        - cmd: "mypy src/tank/cli/"
          must_pass: true
        - cmd: "ruff check src/tank/cli/"
          must_pass: true
      coverage_floor: null
      manual_checklist:
        - "All commands catch TankError and print user-friendly messages"
        - "Exit codes: 0 for success, 1 for errors"
        - "tank pull writes/updates .tank/index.lock after import"
        - "package@version parsing handles edge cases (no @, multiple @)"

    capability_ceiling:
      - "Do not implement TOML writing as a library. Write the lockfile TOML manually with string formatting — it is a simple flat structure."
      - "Do not add --verbose or --debug flags. Logging is deferred."
      - "Do not add color themes or complex formatting beyond basic rich tables."
      - "Do not implement tab completion or shell integration."

    prerequisites:
      read_first:
        - progress.txt
        - docs/architecture.md

    review_targets:
      - target: "tank build produces a .ctx file"
        verified_by: "test_build_command_success"
        assertion: "runner.invoke(cli, ['build', 'my-lib@1.0.0', '--source', fixture_dir]).exit_code == 0 and output .ctx file exists"
      - target: "tank pull rejects when verify fails"
        verified_by: "test_pull_command_verify_fails"
        assertion: "runner.invoke(cli, ['pull', malformed_ctx]).exit_code == 1"
