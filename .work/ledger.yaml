    assumptions:
      - "chunkana is imported as: from chunkana import chunk as chunkana_chunk (or similar). The exact API needs to be verified — check chunkana's actual exports. If the API differs from expected, flag it as an open_question."
      - "chunkana returns chunk objects with at least .content and .heading_path attributes. If the attribute names differ, adapt the wrapper in chunking.py."
      - "zipfile.ZipFile(path, 'w', zipfile.ZIP_DEFLATED) creates a compressed zip. Files are added with zipfile.writestr(arcname, data)."
      - "To compute pack_digest: 1) write manifest with pack_digest='', 2) create zip in memory or as temp file, 3) read all bytes, 4) sha256 hash them, 5) update manifest.json inside the zip with the real digest. This requires creating the zip twice or using a temp file approach."
      - "json.dumps(manifest, indent=2, sort_keys=True) ensures deterministic JSON serialization. sort_keys=True is critical for hash reproducibility."
      - "hashlib.sha256(content.encode('utf-8')).hexdigest() produces the hex digest string. Prefix with 'sha256:' in the output."
      - "generate_summary for prose: split on sentence boundaries ('. ', '? ', '! '), take the first sentence. If >200 chars, truncate at last space before 200 and append '...'."
      - "generate_summary for code-heavy (>50% of content inside code fences): extract the first line of the first code block that looks like a function/class definition (starts with 'def ', 'class ', 'function ', 'export '). Fall back to first prose sentence, then to heading_path."
      - "source_url construction: if --source is './docs' and file is './docs/auth/oauth.md', source_url is 'docs/auth/oauth.md'. Use os.path.normpath or PurePosixPath to normalize, then strip only leading './'."
      - "heading_path construction: strip the --source directory name from the file path prefix. If --source is './docs' and file is 'docs/auth/oauth.md', the prefix is 'auth/oauth' (not 'docs/auth/oauth'). Join with ' / ' separator."
      - "token_count is len(normalized_content) // 4."

    definition_of_done:
      automated:
        - cmd: "pytest tests/test_builder/ -v"
          must_pass: true
        - cmd: "mypy src/tank/builder/"
          must_pass: true
        - cmd: "ruff check src/tank/builder/"
          must_pass: true
      coverage_floor: null
      manual_checklist:
        - "Building the same source directory twice produces identical normalized_content_hash"
        - "Chunk IDs are assigned in lexicographic file order verified by a multi-file test"
        - "source_url is populated on every chunk — no None values"
        - "manifest.json uses sort_keys=True for deterministic serialization"
        - "pack_digest uses the empty-string zeroing convention"

    capability_ceiling:
      - "Do not implement URL crawling or any network-based source. --source is always a local path."
      - "Do not implement --no-recurse, --include, or --exclude flags. These are deferred."
      - "Do not modify the normalization rules — import and call normalize() from tank.builder.normalizer."
      - "If chunkana's API does not match assumptions, stop and flag as open_question. Do not switch to a different chunking library."
      - "Do not implement signature generation. The signatures/ directory in the archive is created empty."

    prerequisites:
      read_first:
        - progress.txt
        - docs/document-processing.md
        - docs/architecture.md
        - docs/decisions.md

    review_targets:
      - target: "discover_files returns paths in lexicographic order"
        verified_by: "test_discover_files_lexicographic_order"
        assertion: "Given files z.md, a/b.md, a/a.md — returned order is a/a.md, a/b.md, z.md"
      - target: "Only .md, .html, .htm files are discovered"
        verified_by: "test_discover_files_extension_whitelist"
        assertion: "A directory containing .md, .html, .htm, .png, .txt, .py returns only the first three"
      - target: "source_url matches decisions.md D4 convention"
        verified_by: "test_build_source_url_relative_paths"
        assertion: "build(source='./docs') with file at docs/auth/oauth.md produces source_url='docs/auth/oauth.md' — includes the source dir name"
      - target: "pack_digest recomputation matches"
        verified_by: "test_compute_pack_digest"
        assertion: "Read .ctx bytes, replace pack_digest with '', hash — matches manifest.pack_digest"
      - target: "normalized_content_hash recomputation matches"
        verified_by: "test_compute_normalized_content_hash"
        assertion: "Extract chunks from .ctx, normalize each, concatenate in ascending ID order with newline separator, hash — matches manifest.normalized_content_hash"
      - target: "chunkana only imported in chunking.py"
        verified_by: "code review / grep"
        assertion: "'from chunkana' or 'import chunkana' appears only in src/tank/builder/chunking.py"

    verification_inputs:
      - function: "generate_summary"
        cases:
          - input: "This function configures OAuth2. It requires a client ID and secret."
            expected: "This function configures OAuth2."
            label: "Prose: first sentence extracted"
          - input: "```python\ndef configure_oauth(client_id: str) -> Config:\n    pass\n```\nSome prose here."
            expected: "def configure_oauth(client_id: str) -> Config:"
            label: "Code-heavy: leading function signature extracted"
          - input: "This is a very long sentence that goes on and on and on and on and on and on and on and on and on and on and on and on and on and on and on and on and on and on and on until it exceeds two hundred characters easily."
            expected: "This is a very long sentence that goes on and on and on and on and on and on and on and on and on and on and on and on and on and on and on and on and on and on and on until it exceeds two hundred..."
            label: "Prose >200 chars: truncated at last word boundary before 200, appended with ..."
      - function: "source_url construction"
        cases:
          - input: "source='./docs', file='./docs/auth/oauth.md'"
            expected: "docs/auth/oauth.md"
            label: "Leading ./ stripped from source, dir name preserved"
          - input: "source='docs', file='docs/auth/oauth.md'"
            expected: "docs/auth/oauth.md"
            label: "No leading ./ to strip, dir name preserved"
      - function: "heading_path construction"
        cases:
          - input: "source='./docs', file='docs/auth/oauth.md', heading='# Overview'"
            expected: "auth/oauth / Overview"
            label: "Source dir name stripped from heading_path prefix, joined with ' / '"

    negative_tests:
      - test_name: "test_discover_files_does_not_include_non_whitelisted"
        description: "A .png, .txt, .py file in the source tree must not appear in discovery results"
        must_not: "discover_files(source_with_mixed_types) returns any path ending in .png, .txt, or .py"
      - test_name: "test_chunk_ids_not_filesystem_dependent"
