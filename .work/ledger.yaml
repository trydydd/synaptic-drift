  # ---------------------------------------------------------------------------
  - id: "chunk-07-builder"
    title: "Pack builder — source discovery, chunking, manifest, archive assembly"
    status: DONE
    depends_on: ["chunk-03-normalizer", "chunk-02-exceptions-and-models"]
    token_budget_hint: large

    local_context: |
      The builder is the largest component in Tank. It takes a local directory of
      documentation files and produces a .ctx pack (a zip archive). The full pipeline
      is described in docs/document-processing.md:

        1. Source discovery — recursive walk, lexicographic sort, extension whitelist
        2. Page construction — each file becomes one page
        3. Chunking — chunkana integration, heading path construction
        4. Summary generation — heuristic (first sentence or leading signature)
        5. Content normalization — using tank.builder.normalizer
        6. Chunk ID assignment — sequential, in lexicographic file order
        7. Hash computation — per-chunk, per-page, and normalized_content_hash
        8. Manifest construction — all fields from CLI args and computed values
        9. Archive assembly — zip with manifest.json, chunks.jsonl, pages.json

      The builder is split across four files:
        - build.py — orchestrator
        - chunking.py — chunkana integration
        - manifest.py — manifest construction and pack_digest
        - normalizer.py — already built in chunk-03

      pack_digest computation: write manifest with pack_digest='', create zip, hash
      the zip bytes, rewrite manifest with real digest. See docs/decisions.md D5.

      source_url: relative path from --source root. Strip only leading './'.
      See docs/decisions.md D4.

    objective: |
      build_pack() takes a package name, version, source directory path, and options,
      and produces a valid .ctx file at the output path. The archive contains
      manifest.json, chunks.jsonl, and pages.json. All hashes are correct.
      Chunk IDs are assigned in deterministic lexicographic order. source_url is
      populated on every chunk as a relative path.

    interface_contract:
      inputs:
        - path: "src/tank/builder/normalizer.py"
          consumes: [normalize]
        - path: "src/tank/storage/models.py"
          consumes: [Pack, Page, Chunk]
        - path: "src/tank/errors.py"
          consumes: [BuildError, TankError]
      outputs:
        - path: "src/tank/builder/build.py"
          exports:
            - |
              def build_pack(
                  package: str,
                  version: str,
                  source: Path,
                  output: Path,
                  lifecycle: str = "draft",
                  owner: str | None = None,
                  policy_profile: str | None = None,
                  source_commit: str | None = None,
              ) -> Path: ...  # returns path to the created .ctx file
        - path: "src/tank/builder/chunking.py"
          exports:
            - |
              @dataclass
              class RawChunk:
                  heading_path: str
                  content: str
                  source_url: str
                  page_id: int
            - "def discover_files(source: Path) -> list[Path]"
            - "def chunk_file(file_path: Path, source: Path, page_id: int) -> list[RawChunk]"
            - "def generate_summary(content: str) -> str"
        - path: "src/tank/builder/manifest.py"
          exports:
            - "def build_manifest(package: str, version: str, chunks_count: int, pages_count: int, normalized_content_hash: str, lifecycle: str, owner: str | None, policy_profile: str | None, source_url: str, source_commit: str | None) -> dict"
            - "def compute_pack_digest(archive_path: Path) -> str"
            - "def compute_normalized_content_hash(chunks: list[RawChunk], normalize_fn: Callable[[str], str]) -> str"
        - path: "tests/test_builder/test_build.py"
          exports:
            - "test_build_produces_valid_ctx()"
            - "test_build_deterministic_hash()"
            - "test_build_source_url_relative_paths()"
            - "test_build_nonexistent_source_raises()"
            - "test_build_empty_source_raises()"
        - path: "tests/test_builder/test_chunking.py"
          exports:
            - "test_discover_files_lexicographic_order()"
            - "test_discover_files_extension_whitelist()"
            - "test_discover_files_recursive()"
            - "test_chunk_file_heading_path_construction()"
            - "test_generate_summary_prose()"
            - "test_generate_summary_code_heavy()"
            - "test_generate_summary_truncation()"
        - path: "tests/test_builder/test_manifest.py"
          exports:
