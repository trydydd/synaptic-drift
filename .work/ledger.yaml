# =============================================================================
# GLOBAL CONTEXT
# =============================================================================

global:

  # PLANNER NOTE (2026-06-11): block rewritten to match the current codebase.
  project_summary: |
    Synaptic Drift (package name: synd) is a local-first documentation pack
    system. It builds versioned .ctx packs from local Markdown/HTML trees or
    from llms.txt / llms-full.txt URLs, verifies them against policy, imports
    them into a local SQLite FTS5 index, and serves them to AI coding agents
    via MCP. All data stays on the user's machine. No cloud dependency, no
    embeddings, no API keys required. CLI verbs: synd build, verify, add,
    remove, sync, query, inspect, serve. The MCP server (synd serve) exposes
    two tools: "search" (summaries + chunk_ids) and "fetch" (full content by
    chunk_id). The eval harness chunks (chunk-e1 …) measure whether this
    retrieval actually works: gold-question retrieval quality, and end-task
    A/B runs driving a local model over a vLLM OpenAI-compatible endpoint.

  tech_stack:
    - "Python 3.12+ (tomllib from stdlib, str | None union syntax)"
    - "pytest (test runner; opt-in flags --network, --benchmark defined in tests/conftest.py)"
    - "mypy (strict mode, runs on src/ only — NOT on tests/)"
    - "ruff (linting and formatting, runs on src/ AND tests/)"
    - "click (CLI framework) + rich (terminal output)"
    - "SQLite + FTS5 (storage and search, via stdlib sqlite3)"
    - "markdown-it-py>=3.0 (custom structural Markdown chunker — chunkana was removed)"
    - "jsonschema (manifest and tool-response schema validation)"
    - "markdownify + beautifulsoup4 (HTML→Markdown for URL builds)"
    - "mcp (MCP Python SDK — OPTIONAL [serve] extra; import guarded)"
    - "hashlib / zipfile (stdlib: SHA-256 hashing, .ctx archive I/O)"

  architecture_decisions:
    - "Shared normalizer: synd.builder.normalizer is the single code path for content normalization at build and verify time. Never duplicate normalization logic."
    - "No **kwargs: spell out every parameter explicitly in every function signature."
    - "SyndError base class with specific subclasses (see src/synd/errors.py). CLI maps subclasses to exit codes (src/synd/cli/exit_codes.py)."
    - "pack_digest: length-prefixed per-entry SHA-256 over ZIP entries sorted by filename, manifest hashed with pack_digest=''. Shared function synd.builder.manifest.compute_pack_digest."
    - "token_count is len(content) // 4. Approximate, advisory only. No tokenizer dependency."
    - "source_url always populated. Local builds: <source-dir-name>/<relative-path> (computed via os.path.relpath(file, source.parent)). URL builds: full https:// page URL."
    - "Lexicographic file walk order for deterministic chunk ID assignment and reproducible hashes."
    - "SQLite WAL mode on creation. Busy timeout 5000ms."
    - "FTS5 with BM25 ranking is the only search backend. BM25 weights: heading_path 2.5x, summary 1.5x, content 1.0x. No embeddings."
    - "MCP tools enforce two-step retrieval: search returns summaries only, fetch returns content by chunk_id. Tool responses validate against tool-response.v1 schema."
    - "Tests and benchmarks call the public API (search_docs/fetch_docs, build_pack, CLI) — never internal helpers to work around limits. See .claude/CLAUDE.md Testing."

  repo_conventions:
    - "snake_case for files, functions, variables. PascalCase for classes."
    - "Type hints on all functions. Use str | None, not Optional[str]."
    - "No comments by default. Only add when the WHY is non-obvious."
    - "Source lives in src/synd/. Tests mirror it: tests/test_builder/, tests/test_search/, etc. Benchmarks in tests/benchmarks/. Evals in tests/evals/."
    - "Static fixtures in tests/fixtures/ (and tests/evals/fixtures/ for the eval corpus). Pytest factory functions for unit tests."
    - "Prefer dedicated exception classes over generic ValueError/TypeError."

  environment:
    required_env_vars: []
    setup_commands:
      - "python3.12 -m venv .venv"
      - ".venv/bin/pip install -e '.[all]'"
      - ".venv/bin/pytest -q"
      - ".venv/bin/ruff check src/ tests/ && .venv/bin/ruff format --check src/ tests/ && .venv/bin/mypy src/"


# =============================================================================
# BEHAVIORS
# =============================================================================

behaviors:
  - id: TDD
    description: |
      Write the test first. The test must fail before any implementation code is written.
      Commit pattern: red → green → refactor.
  - id: SMALL_COMMITS
    description: |
      One logical change per commit. Commit message format: "<type>(<scope>): <summary>"
      Types: feat | fix | test | refactor | chore
  - id: CONTRACT_FIRST
    description: |
      Define types and function signatures before writing implementations.
      Use TODO stubs if needed; signatures must be stable before logic is written.
  - id: PROGRESS_LOG
    description: |
      Before transitioning any chunk to NEEDS_REVIEW, append to progress.txt.
      Even if no gotchas were found, append "[chunk-id] No gotchas." — never skip.
  - id: SOURCE_OF_TRUTH
    description: |
      The codebase is always the source of truth. Before implementing, check what
      actually exists in the repo. Do not assume from documentation alone.
  - id: SHARED_NORMALIZER
    description: |
      Never duplicate normalization logic. Both builder and verifier must use
      synd.builder.normalizer. If you need normalization, import it — do not rewrite.
  - id: ERROR_PATHS
    description: |
      Test error paths and edge cases, not just happy paths. Every public function
      needs tests for: valid input, invalid input, boundary conditions, expected failures.


# =============================================================================
# TABOOS
# =============================================================================

taboos:
  - id: NO_NEW_DEPS
    description: |
      Do not add packages not listed in interface_contract.allowed_new_deps.
      If a dep is genuinely needed, stop, record an open_question, and set status NEEDS_REVIEW.
  - id: RAISE_SPECIFIC_EXCEPTIONS
    description: |
      Never raise ValueError, TypeError, or bare Exception for synd-specific failures.
      Use SyndError subclasses (src/synd/errors.py). If the right subclass doesn't
      exist yet, create one that inherits from SyndError and name it descriptively.
  - id: NO_KWARGS_PASSTHROUGH
    description: |
      Never use **kwargs to pass parameters through. Spell out every parameter
      explicitly in every function signature.
  - id: NO_MODULE_BOUNDARY_VIOLATIONS
    description: |
      CLI must not import from server. Server must not import from builder.
      Builder must not import from CLI. Storage and policy are shared foundations
      that any module may import. Normalizer is in builder but validator may import it.
  - id: NO_SILENT_ASSUMPTIONS
    description: |
      If a required file, export, or env var is missing, do not create a placeholder
      and continue. Stop, record an open_question, set status NEEDS_REVIEW.
  - id: NO_SPEC_DRIFT
    description: |
      Do not implement features, parameters, or behaviors not listed in the chunk's
      objective or interface_contract. Scope creep fails review automatically.
  - id: NO_HASH_STABILITY_CHANGES
    description: |
      Do not modify normalization rules, chunk ID assignment order, hash computation
      logic, or the pack_digest zeroing convention without flagging it. These changes
      break integrity verification for all existing .ctx packs.
  - id: NO_OVERWRITE
    description: |
      Never rewrite an entire file when a targeted edit is sufficient. Use Edit
      operations, not Write, for existing files. Wholesale file rewrites risk
      losing code that was not in context.


