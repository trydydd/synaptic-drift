  # ---------------------------------------------------------------------------
  - id: "chunk-02-exceptions-and-models"
    title: "Base exceptions and data models"
    status: DONE
    depends_on: ["chunk-01-project-scaffold"]
    token_budget_hint: small

    local_context: |
      Tank needs a base exception class and dataclasses for its core data structures.
      These are foundational — almost every other module will import from them.

      The TankError base class lives in src/tank/errors.py. All Tank-specific
      exceptions inherit from it. The CLI will catch TankError subclasses and map
      them to user-facing error messages and exit codes. For this chunk, create
      TankError and a few initial subclasses that are already obvious from the
      architecture: ManifestError, PolicyError, VerificationError, ImportError_ (note
      the underscore to avoid shadowing the builtin).

      The data models live in src/tank/storage/models.py. They are Python dataclasses
      representing the three core entities: Pack (a package record from the packages
      table), Page (a page record), and Chunk (a chunk record). These map directly
      to the SQLite schema in docs/architecture.md. They are plain data containers
      with no methods beyond __init__.

    objective: |
      TankError and initial subclasses are importable from tank.errors.
      Pack, Page, and Chunk dataclasses are importable from tank.storage.models.
