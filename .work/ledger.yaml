        must_not: "Chunk ID sequence depends on file creation order or os.listdir order"
      - test_name: "test_source_url_does_not_strip_source_dir_name"
        description: "source_url must include the --source directory name (docs/auth/oauth.md not auth/oauth.md). This is decisions.md D4."
        must_not: "Any chunk's source_url starts with 'auth/' when --source is './docs'"

    rollback_anchor:
      git_ref: ""
      file_checksums: {}

    handoff:
      status_note: "All 29 tests pass. mypy clean, ruff clean. build_pack() implements full 9-step pipeline: discover -> page construction -> chunkana chunking -> normalization -> hash computation -> manifest -> two-pass archive assembly. RawChunk has extra internal fields (id, summary, token_count, source_commit) beyond ledger spec but no API contract impact. Pack import is deferred to chunk-09."
      files_modified:
